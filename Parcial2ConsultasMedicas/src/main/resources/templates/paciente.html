<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <h4>Paciente</h4>
            <hr>
            <a href="#">Mis Citas</a>
            <hr>
            <a th:href="@{/logout}">Cerrar sesion</a>
        </div>

        <div class="col-md-10 p-4">
            <div class="topbar mb-4 d-flex justify-content-between">
                <h5>Panel Paciente</h5>
                <span>Actualizar horario de mis citas</span>
            </div>

            <div class="card card-custom p-4">
                <h5 class="mb-3">Mis Citas</h5>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                        <tr>
                            <th>Paciente</th>
                            <th>Motivo</th>
                            <th>Consultorio</th>
                            <th>Horario</th>
                            <th>Medico</th>
                            <th>Accion</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="consulta : ${consultas}">
                            <td th:text="${consulta.nombrePaciente}"></td>
                            <td th:text="${consulta.motivoConsulta}"></td>
                            <td th:text="${consulta.numeroConsultorio}"></td>
                            <td>
                                <span th:text="${consulta.horaInicio}"></span> -
                                <span th:text="${consulta.horaFin}"></span>
                            </td>
                            <td th:text="${consulta.medico.nombreCompleto}"></td>
                            <td>
                                <button class="btn btn-sm btn-main btn-editar-horario"
                                        data-bs-toggle="modal"
                                        data-bs-target="#modalHorario"
                                        th:attr="data-id=${consulta.id},
                                                 data-inicio=${consulta.horaInicio},
                                                 data-fin=${consulta.horaFin}">
                                    Editar Horario
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalHorario" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background-color:#0d3b66; color:white;">
                <h5 class="modal-title">Actualizar Horario</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="formHorario" novalidate>
                <div class="modal-body">
                    <input type="hidden" name="id">
                    <div class="mb-3">
                        <label>Hora Inicio</label>
                        <input type="time" name="horaInicio" class="form-control" required>
                        <div class="invalid-feedback"></div>
                    </div>
                    <div class="mb-3">
                        <label>Hora Fin</label>
                        <input type="time" name="horaFin" class="form-control" required>
                        <div class="invalid-feedback"></div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-main">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/css/js/app.js}"></script>
</body>
</html>
