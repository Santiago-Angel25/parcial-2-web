<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/estilos.css}" rel="stylesheet">
</head>
<body>
<div class="login-card">
    <div class="login-left">
        <h3 class="mb-4 text-center">Iniciar Sesion</h3>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Usuario" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Contrasena" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-login">Ingresar</button>
            </div>

            <div class="text-center mt-3">
                <a th:href="@{/registro}" class="text-white">Registrarme como paciente</a>
            </div>

            <div th:if="${param.error}" class="text-danger mt-3 text-center">
                Usuario o contrasena incorrectos
            </div>

            <div th:if="${param.registrado}" class="text-success mt-3 text-center">
                Registro exitoso, ya puede iniciar sesion
            </div>

            <div th:if="${param.logout}" class="text-success mt-3 text-center">
                Sesion cerrada correctamente
            </div>
        </form>
    </div>
</div>
</body>
</html>
